<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evelon Launcher - Cybernetic Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&family=Roboto+Mono:wght@300;400;700&display=swap");

        :root {
            --neon-green: #39ff14;
            --neon-blue: #00f0ff;
            --neon-purple: #8a2be2;
            --dark-background: #0d0d1a;
            --panel-bg: rgba(13, 13, 26, 0.9);
            --input-bg: rgba(255, 255, 255, 0.05);
            --text-primary: #e0e0ff;
            --text-secondary: #a0a0ff;
            --border-glow: 0 0 15px rgba(57, 255, 20, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto Mono', monospace;
        }

        body {
            background: linear-gradient(135deg, var(--dark-background), #000022);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
        }

        /* Animated Background Grid */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        .bg-grid::before,
        .bg-grid::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(0deg, transparent 24%, rgba(57, 255, 20, 0.1) 25%, rgba(57, 255, 20, 0.1) 26%, transparent 27%, transparent 74%, rgba(57, 255, 20, 0.1) 75%, rgba(57, 255, 20, 0.1) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(57, 255, 20, 0.1) 25%, rgba(57, 255, 20, 0.1) 26%, transparent 27%, transparent 74%, rgba(57, 255, 20, 0.1) 75%, rgba(57, 255, 20, 0.1) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            width: 100%;
            max-width: 1100px;
            height: 700px;
            display: flex;
            background: var(--panel-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 50px rgba(57, 255, 20, 0.3),
                0 0 100px rgba(0, 240, 255, 0.2);
            border: 2px solid rgba(57, 255, 20, 0.3);
            transform-style: preserve-3d;
            transform: rotateY(-10deg);
            transition: all 0.5s ease;
        }

        .container:hover {
            transform: rotateY(-5deg) scale(1.02);
            box-shadow: 
                0 0 60px rgba(57, 255, 20, 0.5),
                0 0 120px rgba(0, 240, 255, 0.3);
        }

        .panel {
            flex: 1;
            padding: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .form-box {
            width: 100%;
            max-width: 450px;
            z-index: 10;
        }

        .form-box h2 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-green);
            font-size: 2.8em;
            margin-bottom: 40px;
            text-align: center;
            text-shadow: 
                0 0 10px rgba(57, 255, 20, 0.5),
                0 0 20px rgba(57, 255, 20, 0.3);
            letter-spacing: 2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 25px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 40px;
            background: var(--input-bg);
            border: 2px solid rgba(57, 255, 20, 0.2);
            border-radius: 10px;
            color: var(--text-primary);
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: 'Roboto Mono', monospace;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--neon-green);
            opacity: 0.7;
        }

        .input-group input:focus {
            border-color: var(--neon-green);
            box-shadow: 
                0 0 15px rgba(57, 255, 20, 0.3),
                0 0 5px rgba(57, 255, 20, 0.5) inset;
            outline: none;
        }

        .input-group input:focus + i {
            color: var(--neon-green);
            opacity: 1;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .forgot-password {
            color: var(--neon-blue);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: var(--neon-green);
            border: none;
            border-radius: 10px;
            color: var(--dark-background);
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: all 0.5s ease;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn:hover {
            background: var(--neon-blue);
            transform: translateY(-3px);
            box-shadow: 
                0 5px 15px rgba(57, 255, 20, 0.4),
                0 0 20px rgba(0, 240, 255, 0.3);
        }

        .toggle-text {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 20px;
        }

        .toggle-text a {
            color: var(--neon-blue);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .toggle-text a:hover {
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(57, 255, 20, 0.5);
        }

        .right-panel {
            background: linear-gradient(135deg, rgba(57, 255, 20, 0.1), rgba(13, 13, 26, 0.9));
            position: relative;
        }

        .right-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" opacity="0.3"><defs><pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M 50 0 L 0 0 0 50" fill="none" stroke="rgba(57, 255, 20, 0.1)" stroke-width="1"/></pattern></defs><rect width="100%" height="100%" fill="url(%23grid)"/></svg>');
            transform: rotate(45deg);
            animation: backgroundRotate 20s linear infinite;
        }

        @keyframes backgroundRotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .circuit-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(57, 255, 20, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(57, 255, 20, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    
    <div class="container">
        <div class="panel left-panel">
            <div class="form-box">
                <h2 id="form-title">Cyber Access</h2>
                <form id="auth-form">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <div class="input-group" id="confirm-password-group" style="display: none;">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="confirm-password" placeholder="Confirm Password">
                    </div>
                    <div class="remember-forgot">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn">Log In</button>
                    <p class="toggle-text">
                        Don't have an account? <a href="#" id="toggle-link">Sign up</a>
                    </p>
                </form>
            </div>
        </div>
        <div class="panel right-panel">
            <div class="circuit-overlay"></div>
            <div class="grid-pattern"></div>
        </div>
    </div>

    <script>
        // Interactive form toggle script
        const toggleLink = document.getElementById('toggle-link');
        const authForm = document.getElementById('auth-form');
        const formTitle = document.getElementById('form-title');
        const confirmPasswordGroup = document.getElementById('confirm-password-group');
        const submitBtn = document.querySelector('.btn');

        let isLoginMode = true;

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isLoginMode = !isLoginMode;

            if (isLoginMode) {
                formTitle.textContent = 'Cyber Access';
                confirmPasswordGroup.style.display = 'none';
                toggleLink.textContent = 'Sign up';
                submitBtn.textContent = 'Log In';
            } else {
                formTitle.textContent = 'Create Account';
                confirmPasswordGroup.style.display = 'block';
                toggleLink.textContent = 'Log in';
                submitBtn.textContent = 'Sign Up';
            }
        });

        // Simple form validation
        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!isLoginMode) {
                const confirmPassword = document.getElementById('confirm-password').value;
                if (password !== confirmPassword) {
                    alert('Passwords do not match!');
                    return;
                }
            }

            // Here you would typically add your authentication logic
            console.log(isLoginMode ? 'Logging in' : 'Signing up', email);
            alert(isLoginMode ? 'Login Successful!' : 'Account Created!');
        });
    </script>
</body>
</html>
